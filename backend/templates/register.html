<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Juegos Jri</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
        }
        .card {
            width: min(90vw, 420px);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-top: 0;
        }
        p {
            color: #d6d6d6;
        }
        .btn {
            width: 100%;
            padding: 12px 16px;
            border: 0;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            color: #111;
            background: #fff;
            font-weight: bold;
        }
        .small {
            margin-top: 16px;
            font-size: 14px;
        }
        a {
            color: #9eb5ff;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Register</h1>
        <p>Estas jugando como <strong>Invitado</strong>.</p>
        <button class="btn" onclick="window.location.href='/auth/google/login'">Registrar con Google</button>
        <p class="small">¿Ya tienes una cuenta? <a href="/login">Iniciar Sesión</a></p>
    </main>
</body>
</html>
